<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <!-- Tailwind+daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!--font-awesome-cdn  -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css">
</head>
<body>
            <!-- log in page -->
    <main class="min-h-[90vh] max-w-lg bg-white mx-auto shadow-2xl "> 
        <div class="grid justify-center p-8 space-x-2 ">
            <img class="mx-auto mb-3" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-3xl">
                GitHub Issues Tracker</h2>
            <p class=" text-xl text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <div class="px-8">
           <div class="my-4">
             <h1 class="text-2xl mb-2">Username</h1>
            <input id="input-name" class="w-full p-3 rounded-lg shadow-white mb-2" type="text" maxlength="5"  placeholder="Enter User name">
            <p class="font-semibold  text-[#4A00FF]">Default: admin</p>
           </div>
            <div>
                <h1 class="text-2xl mb-2 ">Password</h1>
            <input id="input-password" class="w-full p-3 rounded-lg shadow-white" type="password" maxlength="8" placeholder="Enter password" name="" id="">
            <p class="font-semibold mt-2 text-[#4A00FF]">Default: admin123</p>
            </div>
            <div>
                <button id="btn-sign" class="bg-[#4A00FF] text-white w-full p-4 rounded-lg mt-6">Sign In</button>  
            </div>
            <br>
            <h2 class="grid justify-center mb-4">OR</h2>
            <div class="grid justify-center">
                <p class="text-[#64748B]  mb-4 text-center">Demo Credentials:</p>
                <div class="w-full bg-[#F8FAFC] px-32 py-5 ">
            <h2 class="text-xl font-semibold">Username: <span 
                class="text-blue-300">admin</span>  </h2>
          
                    <h2 class="text-xl font-semibold">Password: <span class="text-blue-300">admin123</span></h2>
                </div>
            </div>
        </div>
    </main>
    <script src="./script/loginpage.js"></script>
</body>
</html>
